name: Build and Release Cytech Launcher

on:
  push:
    tags:
      - 'v*' # Trigger when you push a tag like v1.0.0
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Just in case, though we don't have them in the current clone

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :ZalithLauncher:assembleDebug -Darch=all

      - name: List files for debugging
        run: find ZalithLauncher/build/outputs/apk/ -name "*.apk"

      - name: Prepare APK for Release
        run: |
          APK_PATH=$(find ZalithLauncher/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          cp "$APK_PATH" CytechLauncher-v${{ github.ref_name }}.apk
        if: startsWith(github.ref, 'refs/tags/')

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: CytechLauncher-*.apk
          name: Cytech Launcher ${{ github.ref_name }}
          body: |
            ## Cytech Launcher Release ${{ github.ref_name }}
            
            Luxury Minecraft: Java Edition Launcher for Android.
            
            **Changes:**
            - Initial Release of Cytech Launcher
            - Rebranded from Zalith Launcher 2
            - New Luxury Theme (Gold & Black)
            - New 3D Minecraft Logo
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
